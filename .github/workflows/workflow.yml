name: Main workflow

on:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    # Prime the caches every Monday
    - cron: 0 1 * * MON

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          # Keep both macOS architectures in CI: Intel and Apple Silicon.
          - macos-15-intel
          - macos-15
          - ubuntu-24.04
          - windows-2025
          - ubuntu-24.04-arm
        ocaml-compiler:
          - "4.14.2"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set-up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Call build script
        run: |
          opam exec -- bash ./fsf_build.sh staging

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: why3pack-${{matrix.os}}
          path: staging
